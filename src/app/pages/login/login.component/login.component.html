<div class="login-container">

    <div class="left-panel">
        <img src="assets/login.svg" alt="">
    </div>

    <div class="right-panel">

        <div class="login-card">

            <h2>HRMS Login</h2>

            <form (ngSubmit)="login()">

                <div class="form-group">
                    <label>UserName</label>
                    <input
                        type="email"
                        [(ngModel)]="UserName"
                        name="UserName"
                        required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        [(ngModel)]="password"
                        name="password"
                        required>
                </div>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>
