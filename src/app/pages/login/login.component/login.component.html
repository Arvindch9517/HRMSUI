<div class="login-wrapper">

  <!-- LEFT SIDE (Branding) -->
  <div class="left-side">
    <div class="content">
      <h2>Techniche HRMS Portal</h2>
      <p>Manage Employees, Attendance, Payroll & Reports in one place.</p>

      <div class="features">
        <div>✔ Secure Login</div>
        <div>✔ Role Based Access</div>
        <div>✔ Real-time Dashboard</div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE (Login Form) -->
  <div class="right-side">
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Please sign in to continue</p>

       <form (ngSubmit)="login()">

                <div class="form-group">
                    <label>UserName</label>
                    <input
                        type="email"
                        [(ngModel)]="UserName"
                        name="UserName"
                        required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        [(ngModel)]="password"
                        name="password"
                        required>
                </div>

                <button type="submit">
                    Login
                </button>

            </form>
    </div>
  </div>

</div>
